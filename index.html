<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Eletrônico</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="container">
        <h1>Caixa Eletrônico</h1>
        <p>Simulador de caixa eletrônico para saques.
        <br>
        Saque apenas valores 10R$ ou maiores.
    </p>
 
     <div id="buscarbar">
    <input 
      type="text" 
      id="valorInput" 
      placeholder="Digite o valor">

    <button id="calcularBtn"
    >Calcular</button>
    </div>

    <div id="saque">
        <h2>Cédulas totais:</h2>
        <span id="cedulasResult"></span>
        <p> Cédulas disponiveis
            <br> 
            2R$
            <br>
            5R$
                <br>
            10R$
            <br>
            20R$
            <br>
            50R$
            <br>
            100R$
            <br>
            200R$
        </p>

    </div>
    </div>
      
    
    <script src="index.js"></script>

      
</body>

</html>
